name: CI

# Ejecuta los checks DETERMINISTAS en cada push/PR: formato, lint, tipos
# estrictos y toda la batería de tests (que incluye hard_violations == 0 y el
# score/conflictos con semilla fija). Los umbrales de tiempo/RAM NO se validan
# aquí: en runners compartidos el ruido dispararía falsos positivos; viven en el
# gate local (scripts/regression_gate.py).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Pipeline de calidad (ruff + mypy + pytest)
        run: python scripts/check.py
