site_name: "RealSchool — SDK del Motor de Horarios"
site_description: "Arquitectura, extensión y referencia del motor de calendarización por restricciones."
docs_dir: docs
site_dir: site
# Offline real: con URLs de directorio, el sitio no abre con file://. Así el
# index.html generado se abre directamente sin servidor.
use_directory_urls: false

theme:
  name: material
  language: es
  # Fuentes del sistema (sin descargar de Google Fonts): sitio 100% offline.
  font: false
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Cambiar a modo oscuro
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Cambiar a modo claro
  features:
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - toc.follow

plugins:
  - search:
      lang: es
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            show_source: true
            show_root_heading: true
            show_signature_annotations: true
            separate_signature: true
            members_order: source
            docstring_section_style: table

# Mermaid vendorizado localmente (offline) + init con re-render claro/oscuro.
extra_javascript:
  - assets/js/mermaid.min.js
  - assets/js/mermaid-init.js

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

nav:
  - Inicio: index.md
  - Arquitectura:
      - Visión general: architecture/overview.md
      - El pipeline: architecture/pipeline.md
      - Restricciones y Tiers: architecture/scoring_tiers.md
      - Formato .bjs: architecture/bjs_format.md
      - Decisiones (ADR): architecture/decisions.md
  - Guías del SDK:
      - Restricciones: sdk_guide/constraints.md
      - Objetivos: sdk_guide/objectives.md
      - Importadores: sdk_guide/importers.md
      - Exportadores: sdk_guide/exporters.md
      - Solvers: sdk_guide/solvers.md
      - Telemetría y eventos: sdk_guide/telemetry.md
  - Referencia de API:
      - Core: reference/core.md
      - SAL: reference/sal.md
      - Plugins: reference/plugins.md
      - Engine: reference/engine.md
      - Application: reference/application.md
      - Serialization: reference/serialization.md
      - CLI: reference/cli.md
